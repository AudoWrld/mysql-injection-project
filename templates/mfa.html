<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MFA Verification</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background: linear-gradient(135deg, #1a1a2e, #16213e); height: 100vh; display: flex; justify-content: center; align-items: center; }
      .container { background: white; padding: 50px 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 400px; max-width: 90%; text-align: center; animation: fadeIn 0.5s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
      h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
      p { font-size: 14px; color: #777; margin-bottom: 25px; }
      input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ccc; font-size: 20px; text-align: center; letter-spacing: 8px; outline: none; margin-bottom: 20px; transition: 0.2s; }
      input:focus { border-color: #1a1a2e; box-shadow: 0 0 6px rgba(26,26,46,0.4); }
      button { width: 100%; padding: 12px; background: #1a1a2e; color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: background 0.3s; }
      button:hover { background: #0f0f1f; }
      .flash { color: red; font-size: 13px; margin-bottom: 15px; }
    </style>
  </head>
  <body>
    <div class="container">
      <form method="POST">
        <h1>Two-Factor Auth</h1>
        <p>Enter the 6-digit code from your authenticator app</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p class="flash">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        <input type="text" name="token" maxlength="6" placeholder="000000" autofocus required />
        <button type="submit">Verify</button>
      </form>
    </div>
  </body>
</html>
