<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background: linear-gradient(135deg, #43cea2, #185a9d); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
      .container { background: white; padding: 28px 32px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; max-width: 90%; animation: fadeIn 0.7s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
      h1 { font-size: 22px; text-align: center; color: #333; margin-bottom: 2px; font-weight: 600; }
      .subtitle { text-align: center; font-size: 12px; color: #888; margin-bottom: 16px; }
      .field { margin-bottom: 12px; }
      label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; font-size: 13px; }
      input { width: 100%; padding: 9px 12px; border-radius: 10px; border: 1px solid #ccc; outline: none; font-size: 14px; transition: 0.2s ease; }
      input:focus { border-color: #185a9d; box-shadow: 0 0 5px rgba(24,90,157,0.4); }
      .rules { background: #f4f8ff; border-left: 4px solid #185a9d; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #555; line-height: 1.7; }
      .rules span { display: block; }
      button { width: 100%; padding: 10px; background: #185a9d; color: white; font-size: 15px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: background 0.3s; }
      button:hover { background: #0f3d6e; }
      .flash { text-align: center; color: red; margin-bottom: 10px; font-size: 13px; }
      .link { text-align: center; margin-top: 10px; font-size: 13px; color: #555; }
      .link a { color: #185a9d; text-decoration: none; font-weight: 600; }
      .strength { font-size: 11px; margin-top: 4px; height: 14px; }
      .bar { height: 3px; border-radius: 4px; margin-top: 5px; background: #eee; }
      .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%; }
    </style>
  </head>
  <body>
    <div class="container">
      <form method="POST" onsubmit="return validateForm()">
        <h1>Register</h1>
        <p class="subtitle">Create your account</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p class="flash">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose a username" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" id="password" placeholder="Choose a strong password" required oninput="checkStrength()" />
          <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
          <div class="strength" id="strength-msg"></div>
        </div>
        <div class="rules">
          <span>At least 8 characters</span>
          <span>One uppercase letter</span>
          <span>One lowercase letter</span>
          <span>One number</span>
          <span>One special character (!@#$...)</span>
        </div>
        <button type="submit">Create Account</button>
        <div class="link">Already have an account? <a href="/">Login</a></div>
      </form>
    </div>
    <script>
      function checkStrength() {
        const pw = document.getElementById("password").value;
        const fill = document.getElementById("bar-fill");
        const msg = document.getElementById("strength-msg");
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[a-z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^a-zA-Z0-9]/.test(pw)) score++;
        const levels = ["", "Very weak", "Weak", "Fair", "Strong", "Very strong"];
        const colors = ["", "#e74c3c", "#e67e22", "#f1c40f", "#2ecc71", "#185a9d"];
        fill.style.width = (score * 20) + "%";
        fill.style.background = colors[score];
        msg.textContent = levels[score];
        msg.style.color = colors[score];
      }

      function validateForm() {
        const pw = document.getElementById("password").value;
        if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[a-z]/.test(pw) || !/[0-9]/.test(pw) || !/[^a-zA-Z0-9]/.test(pw)) {
          alert("Password does not meet the requirements.");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
