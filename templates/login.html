<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; display: flex; justify-content: center; align-items: center; }
      .container { background: white; padding: 50px 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; max-width: 90%; animation: fadeIn 0.7s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
      h1 { font-size: 28px; text-align: center; color: #333; margin-bottom: 25px; font-weight: 600; }
      .field { margin-bottom: 20px; }
      label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; }
      input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; outline: none; font-size: 16px; transition: 0.2s ease; }
      input:focus { border-color: #764ba2; box-shadow: 0 0 5px rgba(118,75,162,0.5); }
      button { width: 100%; padding: 12px; background: #764ba2; color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: background 0.3s ease; }
      button:hover { background: #5c3a8a; }
      .flash { text-align: center; color: red; margin-bottom: 15px; font-size: 14px; }
      .link { text-align: center; margin-top: 15px; font-size: 14px; color: #555; }
      .link a { color: #764ba2; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="container">
      <form method="POST">
        <h1>Login</h1>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p class="flash">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter your username" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required />
        </div>
        <div class="field">
          <button type="submit">Login</button>
        </div>
        <div class="link">No account? <a href="/register">Register here</a></div>
      </form>
    </div>
  </body>
</html>
